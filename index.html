html<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christelle - 音声フランス語会話</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fb; --accent-color: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: var(--primary-color); color: white; padding: 12px; text-align: center; font-weight: bold; }
        #key-container { background-color: #fff3cd; padding: 10px; display: flex; gap: 8px; justify-content: center; align-items: center; border-bottom: 1px solid #ffeeba; }
        #api-key-input { padding: 6px; width: 200px; border: 1px solid #ccc; border-radius: 4px; }
        #save-key-btn { background-color: #ffc107; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px; border-radius: 18px; line-height: 1.5; }
        .bot { background-color: white; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .user { background-color: var(--primary-color); color: white; align-self: flex-end; }
        .audio-btn { background: #e1f0ff; border: none; color: var(--primary-color); padding: 5px 10px; border-radius: 12px; font-size: 0.8rem; cursor: pointer; margin-top: 8px; font-weight: bold; }
        .japanese-translation { margin-top: 8px; font-size: 0.85rem; color: #666; border-top: 1px dashed #ddd; padding-top: 8px; }
        .status-msg { font-size: 0.8rem; color: #888; font-style: italic; align-self: center; }
        .error-msg { color: var(--accent-color); background-color: #fdedec; padding: 10px; border-radius: 8px; border: 1px solid #f5b7b1; font-size: 0.85rem; align-self: center; }
        #input-container { padding: 10px; background-color: white; display: flex; gap: 10px; align-items: center; border-top: 1px solid #e0e0e0; }
        #user-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 24px; font-size: 1rem; }
        .icon-btn { border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; background-color: #f0f0f0; }
        #mic-btn.recording { background-color: var(--accent-color); color: white; }
    </style>
</head>
<body>

    <header>Christelle (クリステル) - Gemini自動接続</header>

    <!-- 保存ボタンの不要なエラーを無くし、超シンプルに直接保存する仕組みに変更 -->
    <div id="key-container">
        <span style="font-size: 0.8rem; color: #856404;">Geminiキーを入れてください:</span>
        <input type="password" id="api-key-input" placeholder="AQ...">
        <button id="save-key-btn" onclick="justSaveKey()">保存</button>
    </div>

    <div id="chat-container">
        <div class="message bot">
            <span id="first-fr">Enchanté ! Je m'appelle Christelle. J'ai 43 ans et je viens du nord-ouest de la France. Comment tu t'appelles ?</span>
            <br>
            <button class="audio-btn" onclick="speakFrench(document.getElementById('first-fr').innerText)">🔊 発音を聴く</button>
            <div class="japanese-translation">【日本語訳】はじめまして！クリステルです。43歳で、フランスの北西部出身です。お名前は何ですか？</div>
        </div>
    </div>

    <div id="input-container">
        <button id="mic-btn" class="icon-btn" onclick="toggleSpeechRecognition()">🎙️</button>
        <input type="text" id="user-input" placeholder="フランス語で話すか文字を入力..." autocomplete="off">
        <button class="icon-btn" style="background-color: var(--primary-color); color: white;" onclick="processInput()">➤</button>
    </div>

    <script>
        let recognition;
        let isRecording = false;
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        
        let chatHistory = [
            { role: "user", parts: [{ text: "Bonjour" }] },
            { role: "model", parts: [{ text: "Enchanté ! Je m'appelle Christelle. J'ai 43 ans et je viens du nord-ouest de la France. Comment tu t'appelles ?" }] }
        ];

        if (apiKey) {
            document.getElementById('key-container').style.display = 'none';
        }

        // 最もシンプルで不具合の起きない保存関数
        function justSaveKey() {
            const rawKey = document.getElementById('api-key-input').value.trim();
            if (!rawKey) {
                alert("キーが空欄です");
                return;
            }
            localStorage.setItem('gemini_api_key', rawKey);
            apiKey = rawKey;
            document.getElementById('key-container').style.display = 'none';
            alert("キーを記憶しました！一度画面を切り替えます。");
            window.location.reload();
        }

        // 音声認識の設定
        try {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'fr-FR';
                recognition.interimResults = false;
                recognition.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; };
                recognition.onerror = () => { stopRecording(); };
                recognition.onend = () => { stopRecording(); };
            }
        } catch(e) {}

        function toggleSpeechRecognition() {
            if (!recognition) { alert("ブラウザが音声入力に対応していません。SafariかChromeでお試しください。"); return; }
            if (isRecording) { recognition.stop(); } else { startRecording(); }
        }

        function startRecording() {
            try {
                window.speechSynthesis.cancel();
                recognition.start();
                document.getElementById('mic-btn').classList.add('recording');
                document.getElementById('mic-btn').innerText = '🛑';
                isRecording = true;
            } catch (e) { stopRecording(); }
        }

        function stopRecording() {
            const micBtn = document.getElementById('mic-btn');
            if(micBtn) { micBtn.classList.remove('recording'); micBtn.innerText = '🎙️'; }
            isRecording = false;
        }

        function speakFrench(text) {
            try {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } catch(e) {}
        }

        async function processInput() {
            if (!apiKey) { alert("最初に上の黄色い欄にキーを保存してください。"); return; }
            const inputField = document.getElementById('user-input');
            const messageText = inputField.value.trim();
            if (messageText === '') return;

            const chatContainer = document.getElementById('chat-container');
            const userMessage = document.createElement('div');
            userMessage.className = 'message user';
            userMessage.innerText = messageText;
            chatContainer.appendChild(userMessage);
            inputField.value = '';
            
            const statusMsg = document.createElement('div');
            statusMsg.className = 'status-msg';
            statusMsg.innerText = "Christelleが返信を考えています...";
            chatContainer.appendChild(statusMsg);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            chatHistory.push({ role: "user", parts: [{ text: messageText }] });

            try {
                // 最新のAPI仕様に完全対応したリクエスト
                const response = await fetch(`https://googleapis.com{apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: chatHistory,
                        systemInstruction: {
                            parts: [{
                                text: "あなたの設定は、名前: Christelle(43歳・フランス北西部出身)。親切で共感的なフランス語会話のパートナーです。趣味は読書、散歩、映画、パズル、SopranoやSlimaneの音楽です。以下のルールを厳守してください: 1. 返信はフランス語で最大2〜3文（30語以内）のシンプルな日常会話表現。 2. 返信の最後は必ず次の会話に繋がる簡単な質問（フランス語）で終わること。 3. 返信の末尾に必ず『 --- 』という区切り線を入れ、その後にあなたのフランス語の【日本語訳】を付けてください。文法ミスなどのアドバイスがあればそれも日本語で優しく1点添えてください。"
                            }]
                        }
                    })
                });

                const data = await response.json();
                statusMsg.remove();

                if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
                    let aiReply = data.candidates[0].content.parts[0].text;
                    chatHistory.push({ role: "model", parts: [{ text: aiReply }] });

                    const botMessage = document.createElement('div');
                    botMessage.className = 'message bot';
                    
                    let frenchPart = aiReply;
                    let japanesePart = "";
                    
                    if (aiReply.includes("---")) {
                        const parts = aiReply.split("---");
                        frenchPart = parts[0].trim();
                        japanesePart = parts[1].trim();
                    }

                    botMessage.innerHTML = `
                        <span>${frenchPart}</span>
                        <br>
                        <button class="audio-btn" onclick="speakFrench(this.previousElementSibling.innerText)">🔊 もう一度聴く</button>
                        ${japanesePart ? `<div class="japanese-translation">${japanesePart.replace(/\n/g, '<br>')}</div>` : ''}
                    `;
                    chatContainer.appendChild(botMessage);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
