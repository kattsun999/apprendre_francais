html<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christelle - 完全自動・音声フランス語会話</title>
    <!-- CSSスタイルの定義（チャット画面、エラーメッセージ表示用など） -->
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fb; --accent-color: #e74c3c; }
        body { font-family: sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: var(--primary-color); color: white; padding: 12px; text-align: center; }
        #key-container { background-color: #fff3cd; padding: 10px; display: flex; gap: 10px; justify-content: center; }
        #chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px; border-radius: 18px; }
        .bot { background-color: white; align-self: flex-start; }
        .user { background-color: var(--primary-color); color: white; align-self: flex-end; }
        .audio-btn { background: #e1f0ff; border: none; color: var(--primary-color); padding: 5px 10px; border-radius: 12px; cursor: pointer; }
        .error-msg { color: var(--accent-color); background-color: #fdedec; padding: 10px; border-radius: 8px; border: 1px solid #f5b7b1; }
        #input-container { padding: 10px; background-color: white; display: flex; gap: 10px; }
        #user-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 24px; }
        .icon-btn { border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <header>Christelle (クリステル)</header>
    <div id="key-container">
        <input type="password" id="api-key-input" placeholder="AIzaSy...">
        <button onclick="saveApiKey()">保存</button>
    </div>
    <div id="chat-container"></div>
    <div id="input-container">
        <button id="mic-btn" class="icon-btn" onclick="toggleSpeechRecognition()">🎙️</button>
        <input type="text" id="user-input" placeholder="フランス語で入力...">
        <button onclick="processInput()">➤</button>
    </div>
    <script>
        // ... (省略：音声認識機能)
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        function saveApiKey() { /* キー保存処理 */ }

        async function processInput() {
            const inputField = document.getElementById('user-input');
            const messageText = inputField.value;
            // ... (ユーザーメッセージ表示処理)
            
            try {
                const response = await fetch(`https://googleapis.com{apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: messageText }] }] })
                });
                const data = await response.json();
                
                // 【修正ポイント】データ構造（data.candidates[0]...）を修正
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    // 返信表示処理
                } else {
                    throw new Error(data.error ? data.error.message : "読み込みエラー");
                }
            } catch (error) {
                // エラー表示処理
                document.getElementById('chat-container').innerHTML += `<div class="error-msg">${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
